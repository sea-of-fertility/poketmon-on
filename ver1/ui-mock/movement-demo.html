<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>포켓몬 이동 데모</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    overflow: hidden;
    cursor: default;
  }

  /* Fake menubar */
  .menubar {
    height: 28px;
    background: rgba(0,0,0,0.45);
    backdrop-filter: blur(20px);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    font-size: 12px;
    color: rgba(255,255,255,0.85);
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
  }
  .menubar-left { display: flex; gap: 16px; font-weight: 500; }
  .menubar-right { display: flex; gap: 12px; align-items: center; }

  /* Pokemon */
  .pokemon {
    position: absolute;
    cursor: grab;
    user-select: none;
    z-index: 50;
    transition: opacity 0.3s;
  }
  .pokemon.dragging { cursor: grabbing; }

  .sprite {
    width: 64px;
    height: 64px;
    image-rendering: pixelated;
    font-size: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
  }
  .shadow {
    width: 40px;
    height: 8px;
    margin: -2px auto 0;
    background: rgba(0,0,0,0.25);
    border-radius: 50%;
  }

  /* Direction indicator */
  .direction-arrow {
    position: absolute;
    top: -18px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 14px;
    background: rgba(0,0,0,0.6);
    padding: 1px 8px;
    border-radius: 10px;
    color: #4ade80;
    font-weight: 600;
    white-space: nowrap;
    font-size: 11px;
  }

  /* State panel */
  .panel {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(20px);
    border-radius: 16px;
    padding: 16px 24px;
    color: #fff;
    z-index: 200;
    display: flex;
    gap: 24px;
    align-items: center;
    border: 1px solid rgba(255,255,255,0.1);
  }

  .panel-section {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .panel-label {
    font-size: 10px;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .panel-value {
    font-size: 14px;
    font-weight: 600;
  }

  .state-badge {
    display: inline-block;
    padding: 3px 12px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
  }
  .state-idle { background: rgba(74,222,128,0.2); color: #4ade80; }
  .state-walk { background: rgba(96,165,250,0.2); color: #60a5fa; }
  .state-run { background: rgba(245,158,11,0.2); color: #f59e0b; }
  .state-sleep { background: rgba(167,139,250,0.2); color: #a78bfa; }
  .state-reaction { background: rgba(244,114,182,0.2); color: #f472b6; }
  .state-dragged { background: rgba(148,163,184,0.2); color: #94a3b8; }

  /* Controls */
  .controls {
    position: fixed;
    top: 44px;
    right: 16px;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(20px);
    border-radius: 12px;
    padding: 12px 16px;
    z-index: 200;
    border: 1px solid rgba(255,255,255,0.1);
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .ctrl-btn {
    padding: 6px 14px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.06);
    color: #ccc;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: left;
  }
  .ctrl-btn:hover {
    background: rgba(255,255,255,0.12);
    color: #fff;
  }
  .ctrl-btn.active {
    background: rgba(59,130,246,0.3);
    border-color: rgba(59,130,246,0.5);
    color: #60a5fa;
  }
  .ctrl-title {
    font-size: 10px;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 2px;
  }

  /* Trail dots */
  .trail-dot {
    position: absolute;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    pointer-events: none;
    transition: opacity 2s;
  }

  /* Reaction effect */
  .reaction-effect {
    position: absolute;
    font-size: 24px;
    pointer-events: none;
    animation: float-up 1s ease-out forwards;
  }
  @keyframes float-up {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-40px) scale(1.3); }
  }

  /* Sleep zzz */
  .zzz {
    position: absolute;
    font-size: 16px;
    pointer-events: none;
    animation: zzz-float 2s ease-in-out infinite;
  }
  @keyframes zzz-float {
    0%, 100% { opacity: 0.4; transform: translate(0, 0); }
    50% { opacity: 1; transform: translate(10px, -15px); }
  }

  /* Interaction hints */
  .hints {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 16px;
    z-index: 200;
  }
  .hint {
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    background: rgba(0,0,0,0.3);
    padding: 4px 12px;
    border-radius: 10px;
  }

  /* Timer bar */
  .timer-bar {
    width: 100px;
    height: 4px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    overflow: hidden;
  }
  .timer-fill {
    height: 100%;
    background: #60a5fa;
    border-radius: 2px;
    transition: width 0.1s linear;
  }

  /* Edge glow */
  .edge-glow {
    position: fixed;
    pointer-events: none;
    z-index: 10;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .edge-glow.active { opacity: 1; }
  .edge-left { top: 0; left: 0; width: 4px; height: 100%; background: linear-gradient(to right, rgba(96,165,250,0.4), transparent); }
  .edge-right { top: 0; right: 0; width: 4px; height: 100%; background: linear-gradient(to left, rgba(96,165,250,0.4), transparent); }
  .edge-top { top: 28px; left: 0; width: 100%; height: 4px; background: linear-gradient(to bottom, rgba(96,165,250,0.4), transparent); }
  .edge-bottom { bottom: 0; left: 0; width: 100%; height: 4px; background: linear-gradient(to top, rgba(96,165,250,0.4), transparent); }
</style>
</head>
<body>

<div class="menubar">
  <div class="menubar-left"><span>Finder</span> <span>File</span> <span>Edit</span> <span>View</span></div>
  <div class="menubar-right"><span>Wi-Fi</span> <span>100%</span> <span>3:42 PM</span></div>
</div>

<div class="pokemon" id="pokemon">
  <div class="direction-arrow" id="dir-arrow">Idle</div>
  <div class="sprite" id="sprite-body">⚡</div>
  <div class="shadow" id="sprite-shadow"></div>
</div>

<div class="edge-glow edge-left" id="edge-left"></div>
<div class="edge-glow edge-right" id="edge-right"></div>
<div class="edge-glow edge-top" id="edge-top"></div>
<div class="edge-glow edge-bottom" id="edge-bottom"></div>

<div class="controls">
  <div class="ctrl-title">State Control</div>
  <div class="ctrl-btn" onclick="forceState('idle')">Idle (대기)</div>
  <div class="ctrl-btn" onclick="forceState('walk')">Walk (걷기)</div>
  <div class="ctrl-btn" onclick="forceState('run')">Run (뛰기)</div>
  <div class="ctrl-btn" onclick="forceState('sleep')">Sleep (수면)</div>
  <div class="ctrl-title" style="margin-top:8px;">Options</div>
  <div class="ctrl-btn" id="trail-btn" onclick="toggleTrail()">Trail: OFF</div>
  <div class="ctrl-btn" id="auto-btn" onclick="toggleAuto()">Auto: ON</div>
</div>

<div class="hints">
  <div class="hint">Click: Reaction</div>
  <div class="hint">Drag: Move</div>
  <div class="hint">Right panel: State control</div>
</div>

<div class="panel">
  <div class="panel-section">
    <div class="panel-label">State</div>
    <div class="panel-value"><span class="state-badge state-idle" id="state-badge">Idle</span></div>
  </div>
  <div class="panel-section">
    <div class="panel-label">Direction</div>
    <div class="panel-value" id="panel-dir">-</div>
  </div>
  <div class="panel-section">
    <div class="panel-label">Position</div>
    <div class="panel-value" id="panel-pos">0, 0</div>
  </div>
  <div class="panel-section">
    <div class="panel-label">Speed</div>
    <div class="panel-value" id="panel-speed">0 px/f</div>
  </div>
  <div class="panel-section">
    <div class="panel-label">Next transition</div>
    <div class="timer-bar"><div class="timer-fill" id="timer-fill"></div></div>
  </div>
</div>

<script>
const DIRS = [
  { name: 'Down',      arrow: '↓',  dx: 0,    dy: 1    },
  { name: 'DownRight', arrow: '↘',  dx: 0.7,  dy: 0.7  },
  { name: 'Right',     arrow: '→',  dx: 1,    dy: 0    },
  { name: 'UpRight',   arrow: '↗',  dx: 0.7,  dy: -0.7 },
  { name: 'Up',        arrow: '↑',  dx: 0,    dy: -1   },
  { name: 'UpLeft',    arrow: '↖',  dx: -0.7, dy: -0.7 },
  { name: 'Left',      arrow: '←',  dx: -1,   dy: 0    },
  { name: 'DownLeft',  arrow: '↙',  dx: -0.7, dy: 0.7  },
];

const pet = document.getElementById('pokemon');
const dirArrow = document.getElementById('dir-arrow');
const spriteBody = document.getElementById('sprite-body');
const spriteShadow = document.getElementById('sprite-shadow');

let x = window.innerWidth / 2 - 32;
let y = window.innerHeight / 2 - 32;
let state = 'idle';
let dirIdx = 0;
let speed = 0;
let stateTimer = 0;
let stateDuration = 0;
let autoMode = true;
let showTrail = false;
let isDragging = false;
let dragOffX = 0, dragOffY = 0;
let bouncePhase = 0;
let sleepZzz = null;
let idleCounter = 0;

const WALK_SPEED = 2;
const RUN_SPEED = 4;
const MARGIN_TOP = 48;
const MARGIN = 20;

function setState(newState) {
  state = newState;
  stateTimer = 0;

  const badge = document.getElementById('state-badge');
  badge.className = 'state-badge state-' + state;
  badge.textContent = state.charAt(0).toUpperCase() + state.slice(1);

  document.querySelectorAll('.ctrl-btn').forEach(b => b.classList.remove('active'));
  const btns = document.querySelectorAll('.ctrl-btn');
  const stateMap = { idle: 0, walk: 1, run: 2, sleep: 3 };
  if (stateMap[state] !== undefined) btns[stateMap[state]].classList.add('active');

  // Remove sleep zzz
  if (sleepZzz) { sleepZzz.remove(); sleepZzz = null; }

  switch(state) {
    case 'idle':
      speed = 0;
      stateDuration = 2 + Math.random() * 3; // 2-5s
      idleCounter = 0;
      dirArrow.textContent = 'Idle';
      dirArrow.style.color = '#4ade80';
      break;
    case 'walk':
      speed = WALK_SPEED;
      dirIdx = Math.floor(Math.random() * 8);
      stateDuration = 3 + Math.random() * 7; // 3-10s
      dirArrow.style.color = '#60a5fa';
      break;
    case 'run':
      speed = RUN_SPEED;
      dirIdx = Math.floor(Math.random() * 8);
      stateDuration = 10;
      dirArrow.style.color = '#f59e0b';
      break;
    case 'sleep':
      speed = 0;
      stateDuration = 999;
      dirArrow.textContent = 'Sleep 💤';
      dirArrow.style.color = '#a78bfa';
      addSleepZzz();
      break;
    case 'reaction':
      speed = 0;
      stateDuration = 0.8;
      dirArrow.textContent = ['Hop!', 'Eat!', 'Hurt!'][Math.floor(Math.random() * 3)];
      dirArrow.style.color = '#f472b6';
      addReactionEffect();
      break;
    case 'dragged':
      speed = 0;
      stateDuration = 999;
      dirArrow.textContent = 'Dragged';
      dirArrow.style.color = '#94a3b8';
      break;
  }
}

function addSleepZzz() {
  sleepZzz = document.createElement('div');
  sleepZzz.className = 'zzz';
  sleepZzz.textContent = '💤';
  sleepZzz.style.top = '-10px';
  sleepZzz.style.right = '-10px';
  pet.appendChild(sleepZzz);
}

function addReactionEffect() {
  const emojis = ['❗', '❤️', '⭐'];
  const ef = document.createElement('div');
  ef.className = 'reaction-effect';
  ef.textContent = emojis[Math.floor(Math.random() * emojis.length)];
  ef.style.left = (x + 20) + 'px';
  ef.style.top = (y - 10) + 'px';
  document.body.appendChild(ef);
  setTimeout(() => ef.remove(), 1000);
}

function addTrailDot() {
  if (!showTrail) return;
  const dot = document.createElement('div');
  dot.className = 'trail-dot';
  dot.style.left = (x + 30) + 'px';
  dot.style.top = (y + 50) + 'px';
  document.body.appendChild(dot);
  setTimeout(() => { dot.style.opacity = '0'; }, 100);
  setTimeout(() => dot.remove(), 2100);
}

function reflect(edge) {
  document.getElementById('edge-' + edge).classList.add('active');
  setTimeout(() => document.getElementById('edge-' + edge).classList.remove('active'), 300);

  // Reflect direction
  switch(edge) {
    case 'left':
    case 'right':
      // Mirror horizontal: DownRight↔DownLeft, Right↔Left, UpRight↔UpLeft
      const hMirror = [0, 7, 6, 5, 4, 3, 2, 1];
      dirIdx = hMirror[dirIdx];
      break;
    case 'top':
    case 'bottom':
      // Mirror vertical: Down↔Up, DownRight↔UpRight, DownLeft↔UpLeft
      const vMirror = [4, 3, 2, 1, 0, 7, 6, 5];
      dirIdx = vMirror[dirIdx];
      break;
  }
}

function update(dt) {
  if (state === 'dragged') {
    updatePanel();
    return;
  }

  stateTimer += dt;

  // State transitions (auto mode)
  if (autoMode) {
    if (state === 'idle' && stateTimer >= stateDuration) {
      idleCounter += stateDuration;
      if (idleCounter >= 15) { // 15s for demo (normally 60s)
        setState('sleep');
      } else {
        setState('walk');
      }
      return;
    }
    if (state === 'walk' && stateTimer >= stateDuration) {
      setState('idle');
      return;
    }
    if (state === 'run' && stateTimer >= stateDuration) {
      setState('walk');
      return;
    }
    if (state === 'reaction' && stateTimer >= stateDuration) {
      setState('idle');
      return;
    }
  }

  // Movement
  if (speed > 0) {
    const dir = DIRS[dirIdx];
    x += dir.dx * speed;
    y += dir.dy * speed;

    // Screen edge reflection
    const maxX = window.innerWidth - 64;
    const maxY = window.innerHeight - 80;

    if (x <= MARGIN) { x = MARGIN; reflect('left'); }
    if (x >= maxX - MARGIN) { x = maxX - MARGIN; reflect('right'); }
    if (y <= MARGIN_TOP) { y = MARGIN_TOP; reflect('top'); }
    if (y >= maxY - MARGIN) { y = maxY - MARGIN; reflect('bottom'); }

    dirArrow.textContent = DIRS[dirIdx].name + ' ' + DIRS[dirIdx].arrow;
    addTrailDot();
  }

  // Bounce animation
  bouncePhase += dt * (state === 'run' ? 12 : 8);
  const bounceY = (state === 'walk' || state === 'run') ? Math.sin(bouncePhase) * 3 : 0;
  const shadowScale = 1 - Math.abs(Math.sin(bouncePhase)) * 0.15;

  pet.style.left = x + 'px';
  pet.style.top = (y + bounceY) + 'px';
  spriteShadow.style.transform = `scaleX(${shadowScale})`;

  // Sleep breathing
  if (state === 'sleep') {
    const breathe = Math.sin(Date.now() / 800) * 2;
    spriteBody.style.transform = `scaleY(${1 + breathe * 0.02})`;
  } else {
    spriteBody.style.transform = '';
  }

  updatePanel();
}

function updatePanel() {
  document.getElementById('panel-dir').textContent = speed > 0 ? DIRS[dirIdx].name + ' ' + DIRS[dirIdx].arrow : '-';
  document.getElementById('panel-pos').textContent = Math.round(x) + ', ' + Math.round(y);
  document.getElementById('panel-speed').textContent = speed + ' px/f';

  const progress = stateDuration < 999 ? Math.min(stateTimer / stateDuration * 100, 100) : 0;
  document.getElementById('timer-fill').style.width = progress + '%';
}

// Game loop
let lastTime = performance.now();
function gameLoop(now) {
  const dt = (now - lastTime) / 1000;
  lastTime = now;
  update(dt);
  requestAnimationFrame(gameLoop);
}

// Mouse interactions
pet.addEventListener('mousedown', (e) => {
  if (e.button === 0) { // Left click
    if (state === 'sleep') {
      setState('idle');
      return;
    }

    // Start drag detection
    isDragging = true;
    dragOffX = e.clientX - x;
    dragOffY = e.clientY - y;
    pet.classList.add('dragging');
    setState('dragged');
  }
});

document.addEventListener('mousemove', (e) => {
  if (isDragging) {
    x = e.clientX - dragOffX;
    y = e.clientY - dragOffY;
    pet.style.left = x + 'px';
    pet.style.top = y + 'px';
    updatePanel();
  }
});

document.addEventListener('mouseup', () => {
  if (isDragging) {
    isDragging = false;
    pet.classList.remove('dragging');
    setState('idle');
  }
});

pet.addEventListener('click', (e) => {
  if (!isDragging && state !== 'dragged' && state !== 'sleep') {
    setState('reaction');
  }
});

// Force state from controls
function forceState(s) {
  idleCounter = 0;
  setState(s);
}

function toggleTrail() {
  showTrail = !showTrail;
  document.getElementById('trail-btn').textContent = 'Trail: ' + (showTrail ? 'ON' : 'OFF');
  document.getElementById('trail-btn').classList.toggle('active', showTrail);
}

function toggleAuto() {
  autoMode = !autoMode;
  document.getElementById('auto-btn').textContent = 'Auto: ' + (autoMode ? 'ON' : 'OFF');
  document.getElementById('auto-btn').classList.toggle('active', autoMode);
}

// Init
pet.style.left = x + 'px';
pet.style.top = y + 'px';
setState('idle');
document.getElementById('auto-btn').classList.add('active');
requestAnimationFrame(gameLoop);
</script>

</body>
</html>
